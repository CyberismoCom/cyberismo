# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "npm" # See documentation for possible values
    directory: "/" # Location of package manifests (root workspace manages all packages)
    schedule:
      interval: "monthly"
    rebase-strategy: "auto"
    open-pull-requests-limit: 20 # Increase from default of 5 to 20 (maximum allowed)
    ignore:
      - dependency-name: "@types/node" # Major version must match the minimum Node version in "engines"
        update-types: ["version-update:semver-major"]
    groups:
      react-dependencies: # Update all React dependencies in one PR
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      eslint-dependencies: # Update all ESLint dependencies in one PR
        patterns:
          - "eslint"
          - "eslint-config-prettier"
          - "eslint-plugin-promise"
          - "typescript-eslint"
          - "@eslint/js"
          - "@typescript-eslint/parser"
      mime-types-dependency:
        patterns:
          - "mime-types"
          - "@types/mime-types"
      hono-dependencies:
        patterns:
          - "hono"
          - "@hono/*"
      testing-dependencies:
        patterns:
          - "@testing-library/*"
          - "jsdom"
          - "global-jsdom"
          - "vitest"
      mui-dependencies: # MUI in its own PR
        patterns:
          - "@mui/*"
      ui-dependencies: # Redux, CodeMirror, routing, forms, i18n, etc.
        patterns:
          - "@reduxjs/*"
          - "react-redux"
          - "redux-persist"
          - "@uiw/*"
          - "@codemirror/*"
          - "codemirror-asciidoc"
          - "react-router"
          - "react-hook-form"
          - "@hookform/*"
          - "react-i18next"
          - "i18next"
          - "react-arborist"
          - "react-resizable-panels"
          - "react-vega"
          - "swr"
          - "dompurify"
          - "mermaid"
      all-other-dependencies: # Catch-all: bundle everything else into one PR
        patterns:
          - "*"
        exclude-patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "eslint"
          - "eslint-config-prettier"
          - "eslint-plugin-promise"
          - "typescript-eslint"
          - "@eslint/js"
          - "@typescript-eslint/parser"
          - "eslint-plugin-react-hooks"
          - "eslint-plugin-react-refresh"
          - "mime-types"
          - "@types/mime-types"
          - "hono"
          - "@hono/*"
          - "@testing-library/*"
          - "jsdom"
          - "global-jsdom"
          - "vitest"
          - "@mui/*"
          - "@reduxjs/*"
          - "react-redux"
          - "redux-persist"
          - "@uiw/*"
          - "@codemirror/*"
          - "codemirror-asciidoc"
          - "react-router"
          - "react-hook-form"
          - "@hookform/*"
          - "react-i18next"
          - "i18next"
          - "react-arborist"
          - "react-resizable-panels"
          - "react-vega"
          - "swr"
          - "dompurify"
          - "mermaid"

