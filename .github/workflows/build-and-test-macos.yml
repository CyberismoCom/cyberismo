# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Build & test (macOS)

on:
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  # Allow manual triggering
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    strategy:
      matrix:
        node-version: ["${{ vars.NODE_VERSION }}"]

    permissions:
      contents: read
      packages: write

    defaults:
      run:
        shell: bash -el {0}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install pnpm
      uses: pnpm/action-setup@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'
        registry-url: 'https://npm.pkg.github.com'
        scope: '@cyberismo'
    - name: Set up Ruby
      uses: ruby/setup-ruby@829114fc20da43a41d27359103ec7a63020954d4 # v1
      with:
        ruby-version: '3.2'
    - name: Install asciidoctor-pdf
      run: |
        gem install --no-document asciidoctor-pdf rouge
    - name: Checkout cyberismo-docs repository for testing purposes
      uses: actions/checkout@v4
      with:
        repository: CyberismoCom/cyberismo-docs
        path: .tmp/cyberismo-docs
        ref: main
    - run: pnpm install
    - name: Resolve clingo submodule SHA
      id: clingo-sha
      run: echo "sha=$(git -C tools/node-clingo/external/clingo rev-parse HEAD)" >> "$GITHUB_OUTPUT"
    - name: Cache bundled clingo build
      uses: actions/cache@v4
      with:
        path: tools/node-clingo/external/clingo/build
        key: clingo-${{ runner.os }}-${{ runner.arch }}-node${{ vars.NODE_VERSION }}-${{ steps.clingo-sha.outputs.sha }}-${{ hashFiles('tools/node-clingo/scripts/build-clingo.cmake', 'tools/node-clingo/binding.gyp') }}
    - name: Build node-clingo native binary
      run: pnpm --filter @cyberismo/node-clingo run build:native
    - run: pnpm --filter=app exec cypress install
    - run: pnpm prettier-check
    - run: pnpm build
    - run: pnpm test
