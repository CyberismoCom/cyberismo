name: Publish

# Triggered by the bump-version PR landing on main. Pre-merge gates
# (build-and-test.yml, test-pr-docker.yml, pack-test.yml) have already
# validated source, docker image, and the published artifact shape.
# This workflow only ships.
on:
  push:
    branches:
      - main
    paths:
      - tools/cli/package.json
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write

concurrency:
  group: cli-release
  cancel-in-progress: false

jobs:
  tag:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine CLI version
        id: version
        run: |
          VERSION=$(node -p "require('./tools/cli/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=cyberismo-${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on remote; nothing to do."
            exit 0
          fi

          git tag -a "${TAG}" -m "Release version ${TAG#cyberismo-}"
          git push origin "${TAG}"

  publish-npm:
    needs: tag
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4

      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: 'pnpm'

      - name: Set publishing config
        run: pnpm config set '//registry.npmjs.org/:_authToken' "${NODE_AUTH_TOKEN}"
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Build
        run: pnpm build

      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish packages
        run: pnpm ci:publish

  push-image:
    needs: [tag, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}
          submodules: recursive

      - name: Compute docker tags
        id: docker
        env:
          VERSION: ${{ needs.tag.outputs.version }}
        run: |
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3
        with:
          install: true

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push multi-arch Docker image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/cyberismo:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/cyberismo:${{ needs.tag.outputs.version }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/cyberismo:${{ steps.docker.outputs.minor }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/cyberismo:${{ steps.docker.outputs.major }}

  github-release:
    needs: [tag, push-image]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.tag.outputs.tag }}
          VERSION: ${{ needs.tag.outputs.version }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; leaving it untouched."
            exit 0
          fi
          gh release create "$TAG" \
            --title "Cyberismo v$VERSION" \
            --generate-notes \
            --verify-tag
