# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Build & test (Windows)

on:
  push:
    branches:
      - main
  pull_request:
    branches: [ "main", "temp-main" ]

jobs:
  build:
    runs-on: windows-2022

    strategy:
      matrix:
        node-version: ["${{ vars.NODE_VERSION }}"]

    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install pnpm
      uses: pnpm/action-setup@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'
        registry-url: 'https://npm.pkg.github.com'
        scope: '@cyberismo'
    - name: Set up Ruby
      uses: ruby/setup-ruby@829114fc20da43a41d27359103ec7a63020954d4 # v1
      with:
        ruby-version: '3.2'
    - name: Install asciidoctor-pdf
      run: |
        gem install --no-document asciidoctor-pdf rouge
    - name: Checkout cyberismo-docs repository for testing purposes
      uses: actions/checkout@v4
      with:
        repository: CyberismoCom/cyberismo-docs
        path: .tmp/cyberismo-docs
        ref: main
        set-safe-directory: false
    - run: pnpm install
    - name: Resolve clingo submodule SHA
      id: clingo-sha
      shell: bash
      run: echo "sha=$(git -C tools/node-clingo/external/clingo rev-parse HEAD)" >> "$GITHUB_OUTPUT"
    # Cache only the static archives produced by cmake — that's all the
    # node-gyp binding consumes (see binding.gyp). Skipping the cmake
    # step entirely on cache hit avoids the mtime trap where freshly
    # checked-out sources look newer than cached object files.
    - name: Cache clingo static libs
      id: cache-clingo
      uses: actions/cache@v4
      with:
        path: tools/node-clingo/external/clingo/build/lib
        key: clingo-libs-${{ runner.os }}-${{ runner.arch }}-node${{ vars.NODE_VERSION }}-${{ steps.clingo-sha.outputs.sha }}-${{ hashFiles('tools/node-clingo/scripts/build-clingo.cmake', 'tools/node-clingo/binding.gyp') }}
    - name: Build clingo static libs
      if: steps.cache-clingo.outputs.cache-hit != 'true'
      shell: bash
      run: pnpm --filter @cyberismo/node-clingo run build:clingo
    - name: Build node-clingo native binding
      shell: bash
      run: pnpm --filter @cyberismo/node-clingo run build:binding
    - run: pnpm --filter=app exec cypress install
    - run: pnpm build
    - run: pnpm test
      env:
        CYBERISMO_GIT_USER: ${{ secrets.CYBERISMO_GIT_USER }}
        CYBERISMO_GIT_TOKEN: ${{ secrets.CYBERISMO_GIT_TOKEN }}
