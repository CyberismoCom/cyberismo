name: Build Clingo (Windows, Python Enabled)

on:
  push:
    branches:
      - clingo-test

jobs:
  build-windows:
    name: Build Clingo with Python (Windows)
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Check for python
        run: |
          python --version

      - name: Build Clingo with MSVC (Python Enabled)
        run: |
          git clone --recurse-submodules https://github.com/potassco/clingo.git clingo-source
          cd clingo-source
          mkdir build
          cd build

          # Configure Clingo build with Python support.
          cmake .. -G "Visual Studio 17 2022" -A x64 `
            -DCLINGO_BUILD_WITH_PYTHON=ON `
            -DCLINGO_BUILD_SHARED=ON `
            -DCLINGO_BUILD_STATIC=OFF `
            -DCLINGO_BUILD_APP=OFF `
            -DCMAKE_BUILD_TYPE=Release

          cmake --build . --config Release --target install

      - name: Inspect Build Artifacts
        shell: pwsh
        run: |
          Write-Host "Listing files in clingo-source/build/bin/Release:"
          Get-ChildItem clingo-source/build/bin/Release
          
          Write-Host "Listing files in clingo-source/build/lib/Release:"
          Get-ChildItem clingo-source/build/lib/Release
          
          Write-Host "Listing header files in clingo-source/include:"
          Get-ChildItem clingo-source/include -Recurse

      - name: Upload Clingo Build and Source Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clingo-full-artifact
          path: |
            clingo-source/build/**
            clingo-source/include/**
