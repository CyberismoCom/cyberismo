name: Release node-clingo

# Single workflow for node-clingo: build the native matrix on PRs as
# validation, and on push to main additionally publish the seven native
# sub-packages + umbrella + smoke-test `npm install` on every supported
# platform. Same matrix definition for both, so what we validate in a PR
# is exactly what we ship.
#
# Trigger semantics:
#   - pull_request touching tools/node-clingo/** → matrix build only.
#     This is the validation gate for any source change.
#   - push to main where tools/node-clingo/package.json or this workflow
#     file changed → matrix + publish + smoke. The release IS the
#     version bump. Source-only merges don't re-fire on main; they were
#     already validated in the PR.
#   - workflow_dispatch → manual override. `natives_only` skips the
#     umbrella publish (rarely needed in steady state — umbrella_ready
#     auto-detects empty optionalDependencies).
#
# Both publish jobs are idempotent (`npm view` skips versions already on
# the registry). The publish-umbrella job is additionally gated on
# `umbrella_ready`: the umbrella is only published when its
# optionalDependencies block is populated. This handles the bootstrap
# (empty optionalDependencies → natives publish, umbrella waits until
# the block is wired up in a follow-up commit) and acts as a permanent
# safety rail against accidental "broken umbrella" publishes.

on:
  push:
    # `feature/samutoljamo/INTDEV-1248-1` is here so the bootstrap can be
    # exercised before the workflow is on `main` (workflow_dispatch isn't
    # available off the default branch). Remove this branch entry before
    # merging to main.
    branches: [main, feature/samutoljamo/INTDEV-1248-1]
    paths:
      - 'tools/node-clingo/package.json'
      - '.github/workflows/release-node-clingo.yml'
  pull_request:
    branches: [main]
    paths:
      - 'tools/node-clingo/**'
      - '.github/workflows/release-node-clingo.yml'
  workflow_dispatch:
    inputs:
      natives_only:
        description: 'Skip the umbrella publish (manual override)'
        type: boolean
        default: false

concurrency:
  group: release-node-clingo-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.r.outputs.version }}
      umbrella_ready: ${{ steps.r.outputs.umbrella_ready }}
    steps:
      - uses: actions/checkout@v4
      - id: r
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./tools/node-clingo/package.json').version")
          # umbrella_ready guards against publishing a broken umbrella: the
          # umbrella's optionalDependencies must be populated, otherwise
          # consumers would install it and get no native binary. Used by
          # the bootstrap (empty → skip umbrella, publish only natives) and
          # as a permanent safety rail in steady state.
          OPT_DEPS_COUNT=$(node -p "Object.keys(require('./tools/node-clingo/package.json').optionalDependencies || {}).length")
          UMBRELLA_READY=true
          if [ "$OPT_DEPS_COUNT" = "0" ]; then UMBRELLA_READY=false; fi
          echo "Resolved version: $VERSION"
          echo "umbrella_ready: $UMBRELLA_READY"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "umbrella_ready=$UMBRELLA_READY" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    target: linux-x64-gnu    }
          - { os: ubuntu-latest,    target: linux-x64-musl   }
          - { os: ubuntu-24.04-arm, target: linux-arm64-gnu  }
          - { os: ubuntu-24.04-arm, target: linux-arm64-musl }
          - { os: macos-15-intel,   target: darwin-x64       }
          - { os: macos-latest,     target: darwin-arm64     }
          - { os: windows-latest,   target: win32-x64        }
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}

      - uses: pnpm/action-setup@v4

      # Host install is unused on the musl matrix (the docker run does its
      # own install inside the container) and only causes the container to
      # see glibc-flavoured node_modules and wipe-and-reinstall.
      - if: ${{ !endsWith(matrix.target, '-musl') }}
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Resolve clingo submodule SHA
        id: clingo-sha
        shell: bash
        run: echo "sha=$(git -C tools/node-clingo/external/clingo rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache bundled clingo build
        uses: actions/cache@v4
        with:
          path: tools/node-clingo/external/clingo/build
          key: clingo-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-node${{ vars.NODE_VERSION }}-${{ steps.clingo-sha.outputs.sha }}-${{ hashFiles('tools/node-clingo/scripts/build-clingo.cmake', 'tools/node-clingo/binding.gyp') }}

      - name: Build native binary (Linux glibc)
        if: ${{ startsWith(matrix.target, 'linux-') && !endsWith(matrix.target, '-musl') }}
        env:
          CC: gcc-14
          CXX: g++-14
        run: pnpm --filter @cyberismo/node-clingo run build:native

      - name: Build native binary (macOS / Windows)
        if: ${{ !startsWith(matrix.target, 'linux-') }}
        run: pnpm --filter @cyberismo/node-clingo run build:native

      - name: Build native binary (musl in Docker)
        if: ${{ endsWith(matrix.target, '-musl') }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            node:22-alpine \
            sh -c '
              set -eu
              apk add --no-cache g++ python3 make cmake git
              corepack enable
              corepack prepare pnpm@10.8.0 --activate
              pnpm install --frozen-lockfile --ignore-scripts
              pnpm --filter @cyberismo/node-clingo run build:native
            '

      - name: Verify native binary exists
        shell: bash
        run: test -f tools/node-clingo/build/Release/node-clingo.node

      - name: Assemble per-platform package
        run: node tools/node-clingo/scripts/build-native-packages.js @cyberismo/node-clingo-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: node-clingo-pkg-${{ matrix.target }}
          path: tools/node-clingo/dist-packages/@cyberismo/node-clingo-${{ matrix.target }}/
          if-no-files-found: error
          retention-days: 7

  publish-natives:
    needs: [resolve, build]
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: npm install -g npm@latest

      - uses: actions/download-artifact@v4
        with:
          path: native-packages
          pattern: node-clingo-pkg-*
          merge-multiple: false

      - name: Publish native sub-packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node tools/node-clingo/scripts/publish-natives.js --dir native-packages

  publish-umbrella:
    needs: [resolve, publish-natives]
    if: ${{ github.event_name != 'pull_request' && !inputs.natives_only && needs.resolve.outputs.umbrella_ready == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - run: pnpm config set '//registry.npmjs.org/:_authToken' "${NODE_AUTH_TOKEN}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm build
      - run: npm install -g npm@latest

      - name: Publish umbrella
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.resolve.outputs.version }}"
          published=$(npm view "@cyberismo/node-clingo@${VERSION}" version 2>/dev/null || true)
          if [ "$published" = "$VERSION" ]; then
            echo "@cyberismo/node-clingo@${VERSION} already published; skipping."
            exit 0
          fi
          pnpm --filter @cyberismo/node-clingo publish --no-git-checks --access public

  smoke:
    needs: [resolve, publish-umbrella]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  label: linux-glibc  }
          - { os: macos-15-intel, label: darwin-x64   }
          - { os: macos-latest,   label: darwin-arm64 }
          - { os: windows-latest, label: win32-x64    }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}
      - name: npm install + import
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.resolve.outputs.version }}"
          mkdir -p smoke && cd smoke
          npm init -y >/dev/null
          npm pkg set type=module >/dev/null
          for i in 1 2 3 4 5 6 7 8; do
            npm view "@cyberismo/node-clingo@${VERSION}" version >/dev/null 2>&1 && break
            [ "$i" -eq 8 ] && { echo "umbrella not on npm" >&2; exit 1; }
            sleep 10
          done
          npm install "@cyberismo/node-clingo@${VERSION}"
          node --input-type=module -e "import { ClingoContext } from '@cyberismo/node-clingo'; const c = new ClingoContext(); console.log(await c.solve('a. b :- a.'));"

  smoke-alpine:
    needs: [resolve, publish-umbrella]
    runs-on: ubuntu-latest
    container: { image: 'node:22-alpine' }
    steps:
      - name: npm install + import (musl)
        shell: sh
        run: |
          set -eu
          VERSION="${{ needs.resolve.outputs.version }}"
          mkdir -p smoke && cd smoke
          npm init -y >/dev/null
          npm pkg set type=module >/dev/null
          i=1
          while [ "$i" -le 8 ]; do
            npm view "@cyberismo/node-clingo@${VERSION}" version >/dev/null 2>&1 && break
            [ "$i" -eq 8 ] && { echo "umbrella not on npm" >&2; exit 1; }
            sleep 10
            i=$((i + 1))
          done
          npm install "@cyberismo/node-clingo@${VERSION}"
          node --input-type=module -e "import { ClingoContext } from '@cyberismo/node-clingo'; const c = new ClingoContext(); console.log(await c.solve('a. b :- a.'));"
